_type: "prompt"
template: |
  You are a classifier that decides whether a question needs project documentation.

  Rules:
  - If the question requires project documentation → RAG
  - If the question contains "프로젝트" or "현대해상" → RAG
  - Otherwise → NORMAL

  Examples:
  Question: 현대해상 프로젝트 구조 설명해줘
  Answer: RAG

  Question: 파이썬 리스트 정렬 방법 알려줘
  Answer: NORMAL

  Question:
  {question}

  Answer with exactly one word:
  RAG or NORMAL

input_variables: ["question"]